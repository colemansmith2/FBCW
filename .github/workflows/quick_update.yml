# .github/workflows/quick_update.yml
# 
# Quick updates for teams, standings, and rosters
# Runs 6 times daily (times in EDT = UTC-4)
#
# This is a lightweight update that doesn't collect weekly scores or player stats.
# Use this for frequent roster tracking during the season.

name: Quick Update

on:
  schedule:
    # Times are in UTC, converting from EDT (UTC-4):
    # 2:00 AM EDT  =  6:00 UTC
    # 10:00 AM EDT = 14:00 UTC
    # 1:00 PM EDT  = 17:00 UTC
    # 4:00 PM EDT  = 20:00 UTC
    # 7:00 PM EDT  = 23:00 UTC
    # 10:00 PM EDT =  2:00 UTC
    - cron: '0 6 * * *'    # 2:00 AM EDT
    - cron: '0 14 * * *'   # 10:00 AM EDT
    - cron: '0 17 * * *'   # 1:00 PM EDT
    - cron: '0 20 * * *'   # 4:00 PM EDT
    - cron: '0 23 * * *'   # 7:00 PM EDT
    - cron: '0 2 * * *'    # 10:00 PM EDT
  
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  quick-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yahoo_oauth yahoo_fantasy_api pandas pynacl requests

      - name: Run quick update
        env:
          # Yahoo OAuth credentials
          YAHOO_CONSUMER_KEY: ${{ secrets.YAHOO_CONSUMER_KEY }}
          YAHOO_CONSUMER_SECRET: ${{ secrets.YAHOO_CONSUMER_SECRET }}
          YAHOO_ACCESS_TOKEN: ${{ secrets.YAHOO_ACCESS_TOKEN }}
          YAHOO_REFRESH_TOKEN: ${{ secrets.YAHOO_REFRESH_TOKEN }}
          YAHOO_TOKEN_TIME: ${{ secrets.YAHOO_TOKEN_TIME }}
          # GitHub PAT for auto-updating secrets when tokens refresh
          GITHUB_PAT: ${{ secrets.PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python collect_data.py quick

      - name: Fetch daily MLB games and lineups
        run: python fetch_daily_games.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "Quick update - $(date +'%Y-%m-%d %H:%M') [automated]"
          git push
